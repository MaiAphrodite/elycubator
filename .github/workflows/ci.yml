name: CI/CD Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest
          
      - name: Install dependencies
        run: bun install
        
      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Test Frontend
        run: |
          cd apps/web
          bun run build

      - name: Build and Push Frontend Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: apps/web/Dockerfile
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/elycubator-web:latest

      - name: Build and Push Backend Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: apps/api/Dockerfile
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/elycubator-api:latest

  deploy-dev:
    needs: build-and-test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Copy deployment files to Dev Server
        uses: appleboy/scp-action@v0.1.4
        with:
          host: 137.184.21.113
          username: root
          password: ${{ secrets.DEV_SERVER_PASSWORD }}
          source: "docker-compose.yml,Caddyfile"
          target: "/opt/elycubator/"

      - name: Deploy to Dev Server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 137.184.21.113
          username: root
          password: ${{ secrets.DEV_SERVER_PASSWORD }}
          script: |
            # Pull the new images
            cd /opt/elycubator
            docker compose pull
            
            # Restart the services
            docker compose up -d --remove-orphans
